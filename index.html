<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matematik Analiz · 50 savol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0d0e12;
            color: #f0f2f6;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .quiz-container {
            background: #161822;
            border: 1px solid #26293b;
            border-radius: 18px;
            padding: 28px 32px;
            width: 100%;
            max-width: 820px;
            box-shadow: 0 24px 48px rgba(0,0,0,0.5);
            max-height: 98vh;
            overflow-y: auto;
        }
        .quiz-container::-webkit-scrollbar { width: 4px; }
        .quiz-container::-webkit-scrollbar-track { background: #161822; }
        .quiz-container::-webkit-scrollbar-thumb { background: #2e334c; border-radius: 10px; }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .progress-bar {
            font-size: 0.78rem;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .score-display { color: #10b981; font-weight: 600; }
        .section-badge {
            display: inline-block;
            background: #1f2a3f;
            padding: 3px 16px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #8db0e0;
            letter-spacing: 0.4px;
            font-weight: 500;
            margin-bottom: 10px;
        }
        .question-text {
            font-size: 1.2rem;
            font-weight: 500;
            line-height: 1.6;
            margin-bottom: 22px;
            color: #f3f5f9;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 9px;
        }
        .option-btn {
            background: transparent;
            border: 1px solid #2e334c;
            color: #e8ecf5;
            padding: 12px 16px;
            border-radius: 10px;
            text-align: left;
            font-size: 0.92rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
            width: 100%;
            line-height: 1.5;
        }
        .option-btn:hover:not(:disabled) {
            background: #1f2235;
            border-color: #6a7fa0;
        }
        .option-btn.correct {
            background: rgba(16,185,129,0.16) !important;
            border-color: #10b981 !important;
            color: #34d399;
            font-weight: 500;
        }
        .option-btn.incorrect {
            background: rgba(239,68,68,0.16) !important;
            border-color: #ef4444 !important;
            color: #f87171;
        }
        .option-btn.show-correct {
            background: rgba(16,185,129,0.16) !important;
            border-color: #10b981 !important;
            color: #34d399;
            font-weight: 500;
        }
        .option-btn.disabled { pointer-events: none; opacity: 0.8; }
        .option-btn.correct.disabled { opacity: 1; }
        .option-btn.show-correct.disabled { opacity: 1; }
        .next-btn-container {
            margin-top: 22px;
            display: flex;
            justify-content: flex-end;
        }
        .next-btn {
            background: #f0f2f6;
            color: #0d0e12;
            border: none;
            padding: 10px 30px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.92rem;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.2s, transform 0.1s;
        }
        .next-btn:hover { opacity: 0.85; transform: scale(1.02); }
        .next-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .score-screen { text-align: center; padding: 30px 0; }
        .score-screen h2 { font-size: 2.2rem; margin-bottom: 8px; }
        .final-score { font-size: 1.2rem; color: #9ca3af; margin-bottom: 30px; }
        .final-score span { color: #10b981; font-weight: 700; font-size: 1.8rem; }
        .restart-btn {
            background: #f0f2f6;
            color: #0d0e12;
            border: none;
            padding: 14px 40px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.2s;
        }
        .restart-btn:hover { opacity: 0.85; }
        @media (max-width: 600px) {
            .quiz-container { padding: 16px; }
            .question-text { font-size: 1.05rem; }
            .option-btn { font-size: 0.85rem; padding: 10px 12px; }
        }
    </style>
</head>
<body>
    <div class="quiz-container" id="quiz">
        <div class="top-bar">
            <div class="progress-bar" id="progress">Savol 1 / 50</div>
            <div class="progress-bar score-display" id="scoreDisplay">✅ 0</div>
        </div>
        <div class="section-badge" id="sectionBadge">Matematik Analiz</div>
        <div class="question-text" id="question"></div>
        <div class="options-container" id="options"></div>
        <div class="next-btn-container">
            <button class="next-btn" id="nextBtn" disabled>Keyingi →</button>
        </div>
    </div>

    <script>
        const QUIZ_DATA = [
            { q: "f: A → B akslantirish in'ektiv deyiladi?", opts: ["∀x₁,x₂∈A, f(x₁)=f(x₂) ⇒ x₁=x₂", "∀y∈B, ∃x∈A: f(x)=y", "f(A)=B", "∅"], correct: 0 },
            { q: "f: A → B akslantirish syur'ektiv deyiladi?", opts: ["∀y∈B, ∃x∈A: f(x)=y", "∀x₁,x₂∈A, f(x₁)=f(x₂) ⇒ x₁=x₂", "f(A)=B", "∅"], correct: 0 },
            { q: "M ∈ R soni E to'plamning yuqori chegarasi deyiladi, agar?", opts: ["∀x∈E: x ≤ M", "∃x∈E: x ≥ M", "∃x∈E: x ≤ M", "∀x∈E: x ≥ M"], correct: 0 },
            { q: "m soni E to'plamning quyi chegarasi deyiladi, agar?", opts: ["∀x∈E: x ≥ m", "∃x∈E: x ≤ m", "∃x∈E: x ≥ m", "∀x∈E: x ≤ m"], correct: 0 },
            { q: "M soni E to'plamning yuqori aniq chegarasi deyiladi, agar?", opts: ["M soni E to'plamning yuqori chegaralari orasidagi eng kichigi", "M soni E to'plamning quyi chegarasi", "M soni E to'plamning yuqori chegarasi", "M soni E to'plamning quyi chegaralari orasidagi eng kattasi"], correct: 0 },
            { q: "m soni E to'plamning quyi aniq chegarasi deyiladi, agar?", opts: ["m soni E to'plamning quyi chegaralari orasidagi eng kattasi", "m soni E to'plamning quyi chegarasi", "m soni E to'plamning yuqori chegaralari orasidagi eng kichigi", "m soni E to'plamning yuqori chegarasi"], correct: 0 },
            { q: "lim (x→2) (x²-4)/(x-2) ni hisoblang:", opts: ["4", "0", "2/3", "-1/3"], correct: 0 },
            { q: "lim (x→0) sin(2x)/x ni hisoblang:", opts: ["2", "0", "2/3", "-1/3"], correct: 0 },
            { q: "lim (x→∞) (2x²+3)/(x²+1) ni hisoblang:", opts: ["2", "1/2", "1", "0"], correct: 0 },
            { q: "lim (x→0) (e^x-1)/x ni hisoblang:", opts: ["1", "1/2", "1", "0"], correct: 0 },
            { q: "Quyidagi funksiyalardan qaysi biri juft funksiya?", opts: ["y = x²", "y = x - 2", "y = x³ - 3", "y = x + 1"], correct: 0 },
            { q: "Quyidagi funksiyalardan qaysi biri toq funksiya?", opts: ["y = x³", "y = x²", "y = x⁴", "y = |x|"], correct: 0 },
            { q: "Quyidagi nuqtalarning qaysi biri y = x²+1 funksiya grafigiga tegishli?", opts: ["(0,1)", "(1,2)", "(2,5)", "(-1,2)"], correct: 0 },
            { q: "Quyidagi nuqtalardan qaysi biri y = √x funksiya grafigiga tegishli?", opts: ["(0,0)", "(1,2)", "(4,2)", "(9,3)"], correct: 0 },
            { q: "Quyidagi funksiyalardan qaysi biri (0;∞) oraliqda o'suvchi?", opts: ["y = x²", "y = 3/x", "y = -x", "y = 1/x"], correct: 0 },
            { q: "∫ x² dx ni hisoblang:", opts: ["x³/3 + C", "x³/2 + C", "x²/2 + C", "x³ + C"], correct: 0 },
            { q: "∫ 1/x dx ni hisoblang:", opts: ["ln|x| + C", "x² + C", "1/x² + C", "e^x + C"], correct: 0 },
            { q: "∫ sin x dx ni hisoblang:", opts: ["-cos x + C", "cos x + C", "sin x + C", "-sin x + C"], correct: 0 },
            { q: "∫ cos x dx ni hisoblang:", opts: ["sin x + C", "-sin x + C", "cos x + C", "-cos x + C"], correct: 0 },
            { q: "∫ e^x dx ni hisoblang:", opts: ["e^x + C", "x e^x + C", "e^x/x + C", "ln x + C"], correct: 0 },
            { q: "∫ (x² + 2x + 1) dx ni hisoblang:", opts: ["x³/3 + x² + x + C", "x³/3 + x² + C", "x² + x + C", "x³ + x² + x + C"], correct: 0 },
            { q: "∫₀¹ x² dx ni hisoblang:", opts: ["1/3", "1/2", "1/4", "1"], correct: 0 },
            { q: "∫₀^π sin x dx ni hisoblang:", opts: ["2", "1", "0", "-1"], correct: 0 },
            { q: "f(x) = x² - 2x + 5 funksiyaning [0;1] kesmadagi eng katta qiymati?", opts: ["5", "2", "0", "6"], correct: 0 },
            { q: "f(x) = x³ - 3x + 2 funksiyaning [0;2] kesmadagi eng kichik qiymati?", opts: ["0", "1", "2", "3"], correct: 0 },
            { q: "f(x) = x² - 4x + 5 funksiyaning [-1;4] kesmadagi eng kichik qiymati?", opts: ["-4", "0", "16", "12"], correct: 0 },
            { q: "f(x) = 3x - x³ funksiyaning [-2;3] kesmadagi eng katta va eng kichik qiymatlari ayirmasi?", opts: ["20", "18", "16", "12"], correct: 0 },
            { q: "f(x) = x³ - 3x² + 1 funksiyaning [-1;4] kesmadagi eng katta va eng kichik qiymatlari ayirmasi?", opts: ["20", "18", "16", "12"], correct: 0 },
            { q: "y = ∛(x-2)/(x-3) funksiyaning aniqlanish sohasi?", opts: ["x ≠ 3", "x < 3", "|x| = 2", "|x| ≥ 2"], correct: 0 },
            { q: "y = -4x³ + 12x funksiyaning minimumini toping:", opts: ["-8", "8.5", "0.5", "-1.3"], correct: 0 },
            { q: "∫ ln x dx ni hisoblang:", opts: ["x ln x - x + C", "x ln x + C", "ln x + C", "1/x + C"], correct: 0 },
            { q: "∫ arctg x dx ni hisoblang:", opts: ["x arctg x - 1/2 ln(1+x²) + C", "x arctg x + C", "arctg x + C", "1/(1+x²) + C"], correct: 0 },
            { q: "∫ x e^x dx ni hisoblang:", opts: ["(x-1)e^x + C", "(x+1)e^x + C", "x e^x + C", "e^x + C"], correct: 0 },
            { q: "∫ sin² x dx ni hisoblang:", opts: ["x/2 - sin 2x/4 + C", "x/2 + sin 2x/4 + C", "sin² x + C", "-cos² x + C"], correct: 0 },
            { q: "∫ cos² x dx ni hisoblang:", opts: ["x/2 + sin 2x/4 + C", "x/2 - sin 2x/4 + C", "cos² x + C", "-sin² x + C"], correct: 0 },
            { q: "∫ tg x dx ni hisoblang:", opts: ["-ln|cos x| + C", "ln|cos x| + C", "ln|sin x| + C", "-ln|sin x| + C"], correct: 0 },
            { q: "∫ ctg x dx ni hisoblang:", opts: ["ln|sin x| + C", "-ln|sin x| + C", "ln|cos x| + C", "-ln|cos x| + C"], correct: 0 },
            { q: "∫ 1/(1+x²) dx ni hisoblang:", opts: ["arctg x + C", "arcsin x + C", "arccos x + C", "arctg x + C"], correct: 0 },
            { q: "∫ 1/√(1-x²) dx ni hisoblang:", opts: ["arcsin x + C", "arccos x + C", "arctg x + C", "ln|1+x| + C"], correct: 0 },
            { q: "∫₀¹ x/(x²+1) dx ni hisoblang:", opts: ["1/2 ln 2", "ln 2", "1/2", "1"], correct: 0 },
            { q: "∫₀^π/2 sin x cos x dx ni hisoblang:", opts: ["1/2", "1/4", "1", "0"], correct: 0 },
            { q: "Tenglamani yeching: |3 - x| = 8", opts: ["x = -5, 11", "x = 5, 11", "x = -5, -11", "x = 5, -11"], correct: 0 },
            { q: "5^log₅(x-7) ≥ 4 tengsizlikni yeching:", opts: ["x ≥ 11", "7 < x ≤ 11", "{11}", "x > 11"], correct: 0 },
            { q: "|2x + 3| < 3 tengsizlikni yeching:", opts: ["-3 < x < 0", "-3 < x < 2", "-3 < x < -2", "-3 < x < -1"], correct: 0 },
            { q: "F(sinx;cosx) ushbu ko'rinishdagi funksiyalar ... funksiyalar deb ataladi.", opts: ["Trigonometrik", "Ratsional", "Ko'rsatkichli", "Aniqlanmagan"], correct: 0 },
            { q: "f(x) funksiya [a,b] oraliqda integralanuvchi va F(x)=∫ₐˣ f(t)dt bo'lsa, F(x) funksiya shu oraliqda ... bo'ladi", opts: ["Uzluksiz", "Uziladigan funksiya", "Integrallanuvchi", "Hosilaga ega"], correct: 0 },
            { q: "f(x) funksiya X oraliqda uzluksiz bo'lsa, f(x) funksiya shu oraliqda doim ... bo'ladi.", opts: ["Boshlang'ich funksiyaga ega", "Kamayuvchi", "O'suvchi", "Barcha javoblar to'g'ri"], correct: 0 },
            { q: "∫₀¹ (2x+1) dx ni hisoblang:", opts: ["2", "1", "3/2", "0"], correct: 0 },
            { q: "∫₀^π cos x dx ni hisoblang:", opts: ["0", "1", "-1", "2"], correct: 0 },
            { q: "f(x)=x² funksiyaning [0,2] kesmadagi o'rtacha qiymati?", opts: ["4/3", "2", "8/3", "1"], correct: 0 },
            { q: "∫₀¹ e^x dx ni hisoblang:", opts: ["e-1", "e", "1", "e+1"], correct: 0 }
        ];

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        let questions = shuffle([...QUIZ_DATA]);
        let current = 0, correct = 0, answered = false;

        const quizEl = document.getElementById('quiz');
        const progressEl = document.getElementById('progress');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const sectionBadge = document.getElementById('sectionBadge');
        const questionEl = document.getElementById('question');
        const optionsEl = document.getElementById('options');
        const nextBtn = document.getElementById('nextBtn');

        function render() {
            if (current >= questions.length) { showScore(); return; }
            const q = questions[current];
            progressEl.textContent = `Savol ${current+1} / ${questions.length}`;
            scoreDisplay.textContent = `✅ ${correct}`;
            sectionBadge.textContent = "Matematik Analiz";
            questionEl.textContent = q.q;
            optionsEl.innerHTML = '';
            const opts = q.opts.map((t, i) => ({ text: t, isCorrect: i === q.correct }));
            shuffle(opts);
            opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.text;
                btn.dataset.correct = opt.isCorrect;
                btn.addEventListener('click', () => handleClick(btn, opt.isCorrect));
                optionsEl.appendChild(btn);
            });
            nextBtn.disabled = true;
            answered = false;
            nextBtn.textContent = current === questions.length - 1 ? '🏁 Yakunlash' : 'Keyingi →';
        }

        function handleClick(btn, isCorrect) {
            if (answered) return;
            answered = true;
            const all = optionsEl.querySelectorAll('.option-btn');
            all.forEach(b => b.classList.add('disabled'));
            all.forEach(b => { if (b.dataset.correct === 'true') b.classList.add('show-correct'); });
            if (isCorrect) { btn.classList.add('correct'); correct++; } else { btn.classList.add('incorrect'); }
            nextBtn.disabled = false;
        }

        function nextQuestion() { if (!answered) return; current++; render(); }

        function showScore() {
            const pct = Math.round((correct / questions.length) * 100);
            const emoji = pct >= 80 ? '🌟' : pct >= 60 ? '💪' : pct >= 40 ? '📚' : '😢';
            quizEl.innerHTML = `
                <div class="score-screen">
                    <h2>${emoji} Test yakunlandi!</h2>
                    <div class="final-score">
                        To‘g‘ri javoblar: <span>${correct}</span> / ${questions.length}
                        <br><span style="font-size:1rem;color:#9ca3af;">(${pct}%)</span>
                    </div>
                    <button class="restart-btn" onclick="location.reload()">🔄 Qayta boshlash</button>
                </div>
            `;
        }

        nextBtn.addEventListener('click', nextQuestion);
        render();
    </script>
</body>
</html>
